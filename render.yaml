services:
  - type: web
    name: flensa-calls-report-qa
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    previews:
      generation: automatic
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_MOCK_REPORT
        value: "true"
      - key: ALLOW_DEV_SESSION
        value: "false"
      - key: PEGASUS_AUTH_MODE
        value: iframe
      - key: PEGASUS_API_URL
        value: https://api.pegasusgateway.com
      - key: SESSION_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: PEGASUS_ALLOWED_PARENT_ORIGIN
        sync: false
      - key: ENABLE_SCOPE_DIAGNOSTICS
        value: "false"
